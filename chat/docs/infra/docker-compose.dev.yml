# Local dependencies for Serverpod development (not production).
# From repo root: docker compose -f docs/infra/docker-compose.dev.yml up -d
#
# Postgres: localhost:5432  user/pass/db: serverpod / serverpod / chat_dev
# Redis:    localhost:6379 (optional; uncomment service + depends_on when needed)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: serverpod
      POSTGRES_PASSWORD: serverpod
      POSTGRES_DB: chat_dev
    ports:
      - "5432:5432"
    volumes:
      - chat_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serverpod -d chat_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"

volumes:
  chat_pg_data:
