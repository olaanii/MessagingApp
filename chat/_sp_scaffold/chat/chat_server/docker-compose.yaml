services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: chat
      POSTGRES_PASSWORD: "WWBkrcYZjA5qD2UKo0m_CbQb6fhdIoln"
    volumes:
      - chat_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "4-d4lLkBScfsyxzLQRHioV-vGFgB8588"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: chat_test
      POSTGRES_PASSWORD: "d4x_A-1trBbq0lE8zfS00fe4bEtxP0T2"
    volumes:
      - chat_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "0I24wZ768B4spTPMK23dVerai3ViGvo2"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  chat_data:
  chat_test_data:
